AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  CodePipeline for kiro-blog-part3.
  GitHub push -> cfn-lint -> Change Set -> Manual Approval -> Execute

Parameters:
  GitHubOwner:
    Type: String
    Default: realktmr
    Description: GitHub owner (username or org)
  GitHubRepo:
    Type: String
    Default: kiro-iac-sample1
    Description: GitHub repository name
  GitHubBranch:
    Type: String
    Default: main
    Description: GitHub branch to track
  NotificationEmail:
    Type: String
    Description: Email address for approval notifications
  TargetStackName:
    Type: String
    Default: kiro-blog-part3
    Description: CloudFormation stack name to update
  TemplateFilePath:
    Type: String
    Default: pattern-3/template.yaml
    Description: Path to the CloudFormation template in the repository

Resources:

  # -------------------------------------------------------
  # CodeConnections - GitHub 接続
  # 作成後にコンソールで手動アクティベートが必要
  # -------------------------------------------------------
  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: kiro-blog-github
      ProviderType: GitHub

  # -------------------------------------------------------
  # S3 - パイプライン アーティファクトバケット
  # -------------------------------------------------------
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub kiro-blog-pipeline-artifacts-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # -------------------------------------------------------
  # SNS - 手動承認メール通知
  # -------------------------------------------------------
  ApprovalTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: kiro-blog-pipeline-approval
      Subscription:
        - Protocol: email
          Endpoint: !Ref NotificationEmail

  # -------------------------------------------------------
  # IAM ロール - CodePipeline
  # -------------------------------------------------------
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: kiro-blog-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ArtifactBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:ListBucket
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*
              - Sid: CodeBuild
                Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt CodeBuildProject.Arn
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:ValidateTemplate
                Resource:
                  - !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${TargetStackName}/*
                  - !Sub arn:aws:cloudformation:${AWS::Region}:aws:transform/*
              - Sid: PassRoleToCloudFormation
                Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt CloudFormationRole.Arn
              - Sid: SnsApproval
                Effect: Allow
                Action: sns:Publish
                Resource: !Ref ApprovalTopic
              - Sid: CodeConnections
                Effect: Allow
                Action: codestar-connections:UseConnection
                Resource: !Ref GitHubConnection

  # -------------------------------------------------------
  # IAM ロール - CodeBuild（cfn-lint のみ、AWS API 不要）
  # -------------------------------------------------------
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: kiro-blog-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/kiro-blog-cfn-lint:*
              - Sid: ArtifactBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*

  # -------------------------------------------------------
  # IAM ロール - CloudFormation（スタック更新用）
  # -------------------------------------------------------
  CloudFormationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: kiro-blog-cloudformation-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  # -------------------------------------------------------
  # CodeBuild プロジェクト（cfn-lint 実行）
  # -------------------------------------------------------
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: kiro-blog-cfn-lint
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: pattern-3/buildspec.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/kiro-blog-cfn-lint

  # -------------------------------------------------------
  # CodePipeline
  # -------------------------------------------------------
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: kiro-blog-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        # Stage 1: GitHub からソース取得
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnection
                FullRepositoryId: !Sub ${GitHubOwner}/${GitHubRepo}
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
                DetectChanges: true
              OutputArtifacts:
                - Name: SourceArtifact
              RunOrder: 1

        # Stage 2: cfn-lint による静的検証
        - Name: Validate
          Actions:
            - Name: cfn-lint
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: ValidatedArtifact
              RunOrder: 1

        # Stage 3: Change Set を作成（差分プレビュー）
        - Name: CreateChangeSet
          Actions:
            - Name: CreateChangeSet
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CHANGE_SET_REPLACE
                StackName: !Ref TargetStackName
                ChangeSetName: pipeline-changeset
                TemplatePath: !Sub SourceArtifact::${TemplateFilePath}
                Capabilities: CAPABILITY_IAM,CAPABILITY_NAMED_IAM
                RoleArn: !GetAtt CloudFormationRole.Arn
                ParameterOverrides: '{}'
              InputArtifacts:
                - Name: SourceArtifact
              RunOrder: 1

        # Stage 4: 担当者がChange Setを確認して承認
        - Name: Approval
          Actions:
            - Name: ManualApproval
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: '1'
              Configuration:
                NotificationArn: !Ref ApprovalTopic
                CustomData: !Sub >-
                  Change Set ready. Stack: ${TargetStackName} /
                  Change Set: pipeline-changeset /
                  Review: https://${AWS::Region}.console.aws.amazon.com/cloudformation/home?region=${AWS::Region}#/stacks
              RunOrder: 1

        # Stage 5: Change Set を実行してスタックを更新
        - Name: ExecuteChangeSet
          Actions:
            - Name: ExecuteChangeSet
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              Configuration:
                ActionMode: CHANGE_SET_EXECUTE
                StackName: !Ref TargetStackName
                ChangeSetName: pipeline-changeset
              RunOrder: 1

Outputs:
  PipelineConsoleUrl:
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${Pipeline}/view
    Description: CodePipeline コンソール URL

  GitHubConnectionArn:
    Value: !Ref GitHubConnection
    Description: >-
      スタック作成後、この接続を手動でアクティベートしてください。
      Settings > Connections > kiro-blog-github > 接続を更新
