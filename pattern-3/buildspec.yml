version: 0.2

# 第3部検証用 buildspec.yml
# 処理内容：cfn-lint で template.yaml を静的検証
# （Change Set 作成は CodePipeline の CloudFormation アクションが担当）

env:
  variables:
    TEMPLATE_PATH: "pattern-3/template.yaml"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "=== Installing cfn-lint ==="
      - pip install cfn-lint --quiet

  build:
    commands:
      - echo "=== cfn-lint validation ==="
      - cfn-lint ${TEMPLATE_PATH}
      - echo "cfn-lint passed"

artifacts:
  files:
    - pattern-3/template.yaml
  discard-paths: no
